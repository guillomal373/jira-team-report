<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Dashboards</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="jira/styles.css">
    <style>
        .container {
            max-width: 960px;
            padding-top: 48px;
        }

        .launcher-card {
            max-width: 760px;
            margin: 0 auto;
            text-align: center;
        }

        .launcher-copy {
            max-width: 520px;
            margin: 0 auto 28px;
            color: #9e9e9e;
            font-size: 1rem;
            line-height: 1.6;
        }

        .launcher-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
            margin-top: 24px;
        }

        .launcher-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 96px;
            padding: 18px 24px;
            border: 1px solid #4a3c28;
            background: linear-gradient(135deg, rgba(201, 168, 92, 0.2) 0%, rgba(20, 20, 20, 0.95) 100%);
            color: #ffffff;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-decoration: none;
            box-shadow:
                0 14px 34px rgba(0, 0, 0, 0.55),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .launcher-button:hover,
        .launcher-button:focus-visible {
            transform: translateY(-2px);
            border-color: #c9a85c;
            box-shadow:
                0 18px 40px rgba(0, 0, 0, 0.65),
                0 0 0 1px rgba(201, 168, 92, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            outline: none;
        }

        @media (max-width: 640px) {
            .launcher-actions {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 3.4em;
                letter-spacing: 4px;
            }

            .subtitle {
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TEAM DASHBOARDS</h1>
            <p class="subtitle">SELECT A MODULE</p>
        </header>

        <section class="trend-section">
            <div class="trend-card launcher-card">
                <div class="trend-card-header">
                    <div class="trend-header-text">
                        <h2 class="trend-main-title">Access Portal</h2>
                        <p class="launcher-copy">Choose the active workspace and open the corresponding dashboard.</p>
                    </div>
                </div>
                <div class="launcher-actions">
                    <a class="launcher-button" href="jira/index.html">JIRA</a>
                    <a class="launcher-button" href="creditorx-issues-appstats/index.html">CreditorX</a>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
